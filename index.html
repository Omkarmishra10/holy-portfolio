<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXIMALIST PORTFOLIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* The aggressive color palette from your screenshots */
            --bg-color: #ff2a2a; /* Bright Red */
            --text-color: #000;
            --accent-blue: #0000ff;
            --accent-yellow: #ffff00;
            --border-thick: 6px solid black;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* Hiding the default mouse to use our custom one */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* --- THE CUSTOM CURSOR --- */
        .cursor {
            width: 40px;
            height: 40px;
            border: 3px solid black;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            background-color: var(--accent-yellow);
            mix-blend-mode: difference; /* Makes it invert colors of whatever it hovers over */
            transform: translate(-50%, -50%);
        }

        /* --- HARSH NAVBAR --- */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            border-bottom: var(--border-thick);
            background-color: #fff;
        }

        .logo {
            font-family: 'Anton', sans-serif;
            font-size: 3rem;
            line-height: 1;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* The Brutalist Buttons with Hard Shadows */
        .nav-item {
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border: 3px solid black;
            padding: 5px 15px;
            background: var(--accent-yellow);
            box-shadow: 6px 6px 0px black; /* Hard shadow, NO blur */
            transition: all 0.1s;
        }

        /* Button click effect */
        .nav-item:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px black;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Massive overlapping text */
        h1 {
            font-family: 'Anton', sans-serif;
            font-size: 14vw;
            line-height: 0.85;
            text-transform: uppercase;
            color: var(--bg-color);
            /* Creating a thick outline using text-shadow */
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000,
                 12px 12px 0 #000; /* Drop shadow */
            z-index: 10;
        }

        /* --- TILTED MARQUEE --- */
        .marquee-container {
            width: 110vw;
            border-top: var(--border-thick);
            border-bottom: var(--border-thick);
            background-color: var(--accent-blue);
            color: #fff;
            overflow: hidden;
            padding: 15px 0;
            position: absolute;
            bottom: 15%;
            transform: rotate(-4deg); /* The crazy tilt */
            z-index: 1;
        }

        .marquee {
            display: flex;
            white-space: nowrap;
            font-family: 'Anton', sans-serif;
            font-size: 3rem;
            animation: scroll 12s linear infinite;
        }

        .marquee span {
            padding: 0 50px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- ASYMMETRICAL GALLERY GRID --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-top: var(--border-thick);
        }

        .gallery-item {
            aspect-ratio: 1;
            border-right: var(--border-thick);
            border-bottom: var(--border-thick);
            /* Placeholder colors instead of images for the demo */
            position: relative;
            overflow: hidden;
        }

        .gallery-item:nth-child(3n) {
            border-right: none;
        }

        .gallery-item:hover {
            background-color: #fff !important;
        }

        /* Brutalist tags for the gallery */
        .tag {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: white;
            color: black;
            font-family: 'Anton', sans-serif;
            border: 3px solid black;
            padding: 5px 15px;
            font-size: 1.5rem;
            box-shadow: 4px 4px 0px black;
        }
    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>

    <nav>
        <div class="logo">BLNDR.WORKS</div>
        <div class="nav-links">
            <div class="nav-item">Projects</div>
            <div class="nav-item">Hit Me Up</div>
        </div>
    </nav>

    <section class="hero">
        <h1>CRAZY<br>VISUALS</h1>
        
        <div class="marquee-container">
            <div class="marquee">
                <span>3D ANIMATION • BLENDER • VFX • MOTION GRAPHICS • </span>
                <span>3D ANIMATION • BLENDER • VFX • MOTION GRAPHICS • </span>
            </div>
        </div>
    </section>

    <section class="gallery">
        <div class="gallery-item" style="background-color: #0000ff;">
            <div class="tag">PROJECT 01</div>
        </div>
        <div class="gallery-item" style="background-color: #000;">
            <div class="tag" style="background: #ffff00;">PROJECT 02</div>
        </div>
        <div class="gallery-item" style="background-color: #ff00ff;">
            <div class="tag">PROJECT 03</div>
        </div>
    </section>

    <script>
        // Simple script to make the custom dot follow your mouse
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
