<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Video Scrubbing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            /* Hide the horizontal scrollbar */
            overflow-x: hidden; 
        }

        /* The container needs to be very tall so we have room to scroll */
        .scroll-container {
            height: 500vh; /* 5 times the height of the screen */
            position: relative;
        }

        /* The video stays locked to the background */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the whole screen */
            opacity: 0.6; /* Dimming it so text is readable */
        }

        /* The text that scrolls over the video */
        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bg-video" src="https://www.w3schools.com/html/mov_bbb.mp4" muted playsinline preload="auto"></video>
    </div>

    <div class="scroll-container">
        <div class="content">Scroll Down</div>
        <div class="content">The Video Moves With You</div>
        <div class="content">Scroll Up To Reverse</div>
        <div class="content">Amazing, right?</div>
        <div class="content">End of Timeline.</div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const video = document.getElementById('bg-video');

        // Wait for the video metadata to load so we know how long it is
        video.onloadedmetadata = function() {
            
            // Tie the video progress to the scroll progress
            gsap.to(video, {
                scrollTrigger: {
                    trigger: ".scroll-container",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: true, // This is the magic word that ties it to the scrollbar
                },
                currentTime: video.duration, // Move video time from 0 to max duration
                ease: "none"
            });
        };
    </script>

</body>
</html>
